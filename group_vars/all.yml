# =====================================================
# 全台共通の設定値 (Global Variables)
# =====================================================

# 1. ソフトウェア・バージョン固定 (Version Pinning)
# 再構築時に勝手にバージョンが上がるのを防ぎ、環境等価性を維持する
# 2026年5月20日時点で最新
docker_version: "29.4.3"
python_base_image: "python:3.12-slim"

# 2. System・基盤設定
# OSの基本設定。ChronyやSSH設定で使用
common_ssh_port: 2222
common_timezone: "Asia/Tokyo"
common_ntp_server: "ntp.nict.jp"
common_swap_size_mb: 2048 # OOM-Kill防止

# 3. 監視・NOCコンテナ設定
# Server Cで稼働するNOC統合コンテナのスペック制限
noc_bot_cpu_limit: 0.5
noc_bot_memory_limit: 512M
# レポートの保存期間（卒業制作の要件：14日間）
noc_report_retention_days: 14

# 4. バックアップ設定
# Server A(司令塔)に保存する際のルートパス
backup_base_dir: "/backup"

