<!DOCTYPE html>
<html lang="ja">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>🛡️ NOC - 監査データストリーム</title>
      <style>
         body {
            background-color: #050b14;
            background-image:
               linear-gradient(rgba(14, 116, 144, 0.05) 1px, transparent 1px),
               linear-gradient(90deg, rgba(14, 116, 144, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #e2e8f0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px;
         }

         .report-container {
            background: linear-gradient(145deg, #0b1524, #0d1e36);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 25px rgba(14, 165, 233, 0.15);
            border: 1px solid rgba(14, 165, 233, 0.3);
            max-width: 1200px;
            margin: 0 auto;
            padding: 35px;
         }

         .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(14, 165, 233, 0.2);
            padding-bottom: 20px;
            margin-bottom: 30px;
         }

         h1 {
            font-size: 24px;
            color: #38bdf8;
            margin: 0;
            letter-spacing: 1px;
            font-weight: 800;
         }

         .meta-target {
            font-size: 14px;
            color: #94a3b8;
            background: rgba(7, 13, 22, 0.6);
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #1e293b;
         }

         .highlight-date {
            color: #38bdf8;
            font-weight: bold;
         }

         .table-wrapper {
            overflow-x: auto;
            background-color: #070d16;
            border-radius: 8px;
            border: 1px solid #1e293b;
            margin-bottom: 30px;
         }

         table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
         }

         th {
            background-color: rgba(14, 165, 233, 0.1);
            color: #38bdf8;
            font-weight: bold;
            padding: 14px 16px;
            border-bottom: 2px solid rgba(14, 165, 233, 0.3);
         }

         td {
            padding: 12px 16px;
            border-bottom: 1px solid #1e293b;
            color: #cbd5e1;
         }

         tr:hover td {
            background-color: rgba(56, 189, 248, 0.03);
            color: #f8fafc;
         }

         .no-data {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-style: italic;
         }

         .action-bar {
            display: flex;
            justify-content: space-between;
            gap: 15px;
         }

         .btn {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
         }

         .btn-download {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
         }

         .btn-download:hover {
            background: linear-gradient(135deg, #059669, #047857);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
         }

         .btn-back {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #334155;
         }

         .btn-back:hover {
            background: rgba(148, 163, 184, 0.05);
            color: #f1f5f9;
            border-color: #64748b;
         }
      </style>
   </head>
   <body>
      <div class="report-container">
         <div class="report-header">
            <h1>監査ログ・メトリクス抽出ストリーム</h1>
            <div class="meta-target"> 対象日時: <span class="highlight-date">{{ year }}年 {{ month }}月 {{ day }}日</span>
            </div>
         </div>
         <div class="table-wrapper"> {% if tables and tables != '[]' %} {{ tables | safe }} {% else %} <div
               class="no-data">⚠️ 指定された日時のパケットログまたはメトリクスデータはデータベースに記録されていません。</div> {% endif %} </div>
         <div class="action-bar">
            <a href="/search" class="btn btn-back">← 管理パネルに戻る</a>
            <a href="/download_csv?year={{ year }}&month={{ month }}&day={{ day }}" class="btn btn-download">監査ログを CSV
               で出力する</a>
         </div>
      </div>
   </body>
</html>
