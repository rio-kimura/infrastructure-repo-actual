---
# =================================================================
# 卒業制作 インフラ構築自動化 全台共通基盤 役割定義 (roles/common/tasks/main.yml)
# =================================================================

# -----------------------------------------------------
# 0. タイムゾーン設定（OS Native仕様の日本時間化）
# -----------------------------------------------------
- name: "OSのタイムゾーンを日本時間(JST)に同期設定"
  community.general.timezone:
    name: "{{ common_timezone | default('Asia/Tokyo') }}"
  # 🎯 永久入力待ち（フリーズ）を引き起こす原因だった「tzselect」コマンドタスクは、
  # この標準モジュールだけでJST切り替えが完全に完結するため、安全のために徹底排除しました。

# -----------------------------------------------------
# 1. スワップ領域 & 時刻同期 (リソース安定化)
# -----------------------------------------------------
- name: "スワップファイルの作成プロセス"
  block:
    - name: "スワップファイルの存在確認"
      ansible.builtin.stat:
        path: /swapfile
      register: swap_stat

    - name: "スワップファイルの生成"
      ansible.builtin.command:
        cmd: "fallocate -l {{ common_swap_size_mb | default(2048) }}M /swapfile"
      when: not swap_stat.stat.exists
      register: fallocate_result
      ignore_errors: yes

    - name: "スワップファイルの生成(ddフォールバック)"
      ansible.builtin.command:
        cmd: "dd if=/dev/zero of=/swapfile bs=1M count={{ common_swap_size_mb | default(2048) }}"
      when: 
        - not swap_stat.stat.exists
        - (fallocate_result is failed or fallocate_result is skipped)

- name: "スワップの権限と永続化"
  block:
    - name: "権限設定"
      ansible.builtin.file:
        path: /swapfile
        owner: root
        group: root
        mode: '0600'
        state: file
    - name: "有効化とマウント設定"
      ansible.posix.mount:
        name: none
        src: /swapfile
        fstype: swap
        opts: sw
        state: present

- name: "Chrony(時刻同期)の設定"
  block:
    - name: "Chronyインストール"
      ansible.builtin.dnf:
        name: chrony
        state: present
    - name: "サービス起動"
      ansible.builtin.service:
        name: chronyd
        state: started
        enabled: true
      notify: "Chronyの再起動"

# -----------------------------------------------------
# 2. Node Exporter の導入 (監視基盤)
# -----------------------------------------------------
- name: "Node Exporter 実行ユーザーの作成"
  ansible.builtin.user:
    name: node_exporter
    shell: /sbin/nologin
    system: yes
    create_home: no

- name: "Node Exporter バイナリのダウンロードと展開"
  ansible.builtin.unarchive:
    src: "https://github.com/prometheus/node_exporter/releases/download/v1.8.1/node_exporter-1.8.1.linux-amd64.tar.gz"
    dest: /tmp
    remote_src: yes
    creates: "/tmp/node_exporter-1.8.1.linux-amd64/node_exporter"

- name: "バイナリの配置"
  ansible.builtin.copy:
    src: "/tmp/node_exporter-1.8.1.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    owner: node_exporter
    group: node_exporter
    mode: '0755'
    remote_src: yes

- name: "Node Exporter systemdユニットファイルの作成"
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Node Exporter
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=node_exporter
      Group=node_exporter
      Type=simple
      ExecStart=/usr/local/bin/node_exporter

      [Install]
      WantedBy=multi-user.target
    mode: '0644'

- name: "Node Exporter サービスの起動と有効化"
  ansible.builtin.service:
    name: node_exporter
    state: started
    enabled: true

# -----------------------------------------------------
# 3. セキュリティ & 通信制御 (Firewalld / SSH)
# -----------------------------------------------------
- name: "セキュリティパッケージのインストール"
  ansible.builtin.dnf:
    name:
      - policycoreutils-python-utils
      - firewalld
      - python3-firewall
    state: present

- name: "Firewalld 起動と全ポート制御"
  block:
    - name: "1. 先にFirewalldサービスを起動・有効化"
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: "2. SSHポート(22)をFirewalldで許可（締め出し防止）"
      ansible.posix.firewalld:
        port: "22/tcp"
        permanent: true
        state: enabled
        immediate: true 

    - name: "3. 監視用ポート(9100)の解放"
      ansible.posix.firewalld:
        port: "9100/tcp"
        permanent: true
        state: enabled
        immediate: true

- name: "SELinux & SSHD 設定変更"
  block:
    - name: "SELinux 22番ポート許可の確認"
      community.general.seport:
        ports: "22"
        proto: tcp
        setype: ssh_port_t
        state: present

    - name: "SSHD要遷化設定（構築用安定設定）"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        validate: "/usr/sbin/sshd -t -f %s"
      loop:
        - { regexp: '^#?Port ', line: "Port 22" }
        - { regexp: '^#?PasswordAuthentication ', line: "PasswordAuthentication yes" }
        - { regexp: '^#?PermitRootLogin ', line: "PermitRootLogin no" }
      notify: restart sshd

# -----------------------------------------------------
# 4. Discordボット環境整備 & 資材デプロイ (本番VPS想定構成)
# -----------------------------------------------------
- name: "【Server A限定】pipパッケージマネージャのインストール"
  ansible.builtin.dnf:
    name:
      - python3-pip
    state: present
  when: inventory_hostname == 'server-a'

- name: "【Server A限定】ボット動作に必要なPython外部ライブラリをインストール"
  ansible.builtin.pip:
    name:
      - schedule
      - requests
      - pandas
    state: present
  when: inventory_hostname == 'server-a'

- name: "【Server A限定】ボットソースコードの独立デプロイ(/optへの配置)"
  ansible.builtin.copy:
    src: "roles/monitor/files/noc_bot"
    dest: "/opt/"
    owner: "vagrant"
    group: "vagrant"
    mode: "0755"
  when: inventory_hostname == 'server-a'

- name: "【Server A限定】ボットのコードを本番Cron仕様（RUN_ONCEスイッチ対応）に全自動置換"
  ansible.builtin.replace:
    path: /opt/noc_bot/src/main.py
    regexp: '(\s+)while True:\n\s+schedule\.run_pending\(\)\n\s+time\.sleep\(1\)'
    replace: |
      \1import os
      \1if os.environ.get("RUN_ONCE") == "true":
      \1    generate_daily_report()
      \1else:
      \1    while True:
      \1        schedule.run_pending()
      \1        time.sleep(1)
  when: inventory_hostname == 'server-a'

# -----------------------------------------------------
# 5. 長期連続稼働テスト用：自動自律運用スケジュール設定
# -----------------------------------------------------
- name: "【Server A限定】Discordへ本番レポートを自動定期配信(AM 9:00)"
  ansible.builtin.cron:
    name: "NOC_system Discord Report Delivery"
    minute: "0"
    hour: "9"
    user: "vagrant"
    # 🎯 [修正の証明] ログの書き出し先を /home/vagrant/noc_bot.log に完全統一し、権限エラーを論理的に根絶
    job: "export PROMETHEUS_URL={{ prometheus_internal_url | default('http://10.149.245.116:9090') }} && export DISCORD_WEBHOOK_URL='{{ vault_discord_webhook_url }}' && export RUN_ONCE=true && python3 /opt/noc_bot/src/main.py >> /home/vagrant/noc_bot.log 2>&1"
  when: inventory_hostname == 'server-a'

- name: "【Server A限定】時系列環境データを自動夜間バックアップ(AM 3:00)"
  ansible.builtin.cron:
    name: "NOC_system Nightly Backup"
    minute: "0"
    hour: "3"
    user: "vagrant"
    job: "ansible-playbook -i /opt/noc-system/inventories/vagrant/hosts.ini /opt/noc-system/site.yml --tags backup >> /home/vagrant/noc_backup.log 2>&1"
  when: inventory_hostname == 'server-a'

- name: "【Server A限定】14日以上経過した古い監査ログ・レポートの自動ローテーション削除(AM 3:05)"
  ansible.builtin.cron:
    name: "NOC_system Report Retention Rotation"
    minute: "5"
    hour: "3"
    user: "vagrant"
    job: "find /var/lib/noc_reports/ -type f -mtime +14 -exec rm -f {} \\;"
  when: inventory_hostname == 'server-a'