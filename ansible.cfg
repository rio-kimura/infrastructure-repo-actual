[defaults]
# 1. 基本設定
# インベントリはまずVagrant(検証用)を見に行くように設定
inventory = ./inventories/vagrant/hosts.ini
roles_path = ./roles
host_key_checking = False
interpreter_python = auto_silent

# 2. セキュリティ設定
# さくらVPS/VM共通の要塞化ポート(2222)をデフォルトに設定
remote_port = 2222

# ★重要：共有フォルダの権限エラーを回避するため絶対パスを指定
vault_password_file = /home/vagrant/.vault_password

# 3. 実行パフォーマンス
# 3台構成のため並列数はデフォルト(5)で十分だが、タイムアウトを長めに設定
timeout = 30

[privilege_escalation]
# 全タスクでsudo実行を基本とする（冪等性の担保に必要）
become = True
become_method = sudo
become_user = root

[ssh_connection]
# SSHの接続効率化
ssh_args = -o ControlMaster=auto -o ControlPersist=60s